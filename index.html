<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OUTBOUND TOOLS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;}
.page{height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;}
.black{background:#000;color:white;}
.white{background:#fff;color:black;}

.btn{
background:#ff9900;
color:#000;
font-weight:bold;
border:none;
padding:14px 28px;
margin:10px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

h1{margin-bottom:20px;}

table{
border-collapse:collapse;
margin:15px auto;
width:90%;
font-size:13px;
}
th{
background:#2ecc71;
color:#000;
padding:6px;
}
td{
border:1px solid #ccc;
padding:5px;
text-align:center;
}
tr:nth-child(even){background:#f9f9f9;}
.grand{background:#c6efce;font-weight:bold;}

input,select{padding:6px;margin:5px;}
td[contenteditable]{background:#fff8dc;}
</style>
</head>

<body>

<div id="app"></div>

<script>
let app=document.getElementById("app");

// ---------- NAVIGATION ----------
function show(html){app.innerHTML=html;}

// ---------- HOME ----------
function home(){
show(`
<div class="page black">
<img src="https://raw.githubusercontent.com/pruthviraj3837-collab/Pickdesk2026/main/Gemini_Generated_Image_v28qxev28qxev28q%20(1).png"
style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;">
<button class="btn" style="position:absolute;bottom:30px;" onclick="tools()">NEXT →</button>
</div>
`);
}

// ---------- TOOLS ----------
function tools(){
show(`
<div class="page black">
<h1>TOOLS</h1>
<button class="btn" onclick="pickTools()">PICK TOOLS</button>
<button class="btn" onclick="packTools()">PACK TOOLS</button>
</div>
`);
}

// ---------- PICK ----------
function pickTools(){
show(`
<div class="page black">
<h1>PICK TOOLS</h1>
<button class="btn" onclick="pickTracker()">PICK UIT TRACKER</button>
<button class="btn" onclick="links()">PICK LINKS</button>
<button class="btn" onclick="under()">TAMPERMONKEY</button>
<button class="btn" onclick="under()">IO ADDRESS</button>
</div>
`);
}

// ---------- PACK ----------
function packTools(){
show(`
<div class="page black">
<h1>PACK TOOLS</h1>
<button class="btn" onclick="packTracker()">PACK UIT TRACKER</button>
</div>
`);
}

// ---------- UNDER ----------
function under(){
show(`
<div class="page black">
<h1>Will be added soon</h1>
<button class="btn" onclick="tools()">⬅ BACK</button>
</div>
`);
}

// ---------- LINKS ----------

function links(){
show(`
<div class="page white">
<h1>PICK LINKS</h1>

<div id="linksContainer">Loading links...</div>

<button class="btn" onclick="pickTools()">⬅ BACK</button>
</div>
`);

/* IMPORTANT: YOUR RAW FILE LINK */
const fileURL = "https://github.com/pruthviraj3837-collab/Pickdesk2026/blob/807ff74c2b2a137e4ce666801d25a107922eeacf/LINKS.txt";

/* FETCH LINKS */
fetch(fileURL)
.then(res => {
if(!res.ok) throw new Error("Fetch failed");
return res.text();
})
.then(text => {

let lines = text.split("\n").filter(l => l.trim() !== "");

if(lines.length === 0){
document.getElementById("linksContainer").innerHTML = "No links found in file";
return;
}

let html = "";

lines.forEach(line => {

/* SUPPORT BOTH FORMATS */
let name = "";
let url = "";

if(line.includes(",")){
let parts = line.split(",");
name = parts[0].trim();
url = parts[1].trim();
}else{
url = line.trim();
name = url;
}

html += `<button class="btn" onclick="openLink('${url}')">${name}</button>`;
});

document.getElementById("linksContainer").innerHTML = html;

})
.catch(err => {
console.error(err);
document.getElementById("linksContainer").innerHTML = "❌ Failed to load links (Check GitHub RAW link)";
});
}

TRACKER UI ----------
function trackerUI(type){
show(`
<div class="page white">
<h1>${type} UIT TRACKER</h1>

<input type="file" id="f1">
<input type="file" id="f2"><br>
<button class="btn" onclick="process()">PROCESS</button>

<div>
<button class="btn" onclick="mode='hours';render()">HOURS</button>
<button class="btn" onclick="mode='quarters';render()">QUARTERS</button>
</div>

<div id="out"></div>

<button class="btn" onclick="tools()">⬅ BACK</button>
</div>
`);
}

function pickTracker(){trackerUI("PICK");}
function packTracker(){trackerUI("PACK");}

// ---------- DATA ----------
let data=[],mode="quarters";

// ---------- PROCESS ----------
async function process(){
let emp=await read(f1.files[0]);
let lc=await read(f2.files[0]);

function col(o,k){return Object.keys(o).find(c=>c.toLowerCase().includes(k));}
function lcFix(v){
v=(v||"")+"";
if(v.includes("1"))return "L1";
if(v.includes("2"))return "L2";
if(v.includes("3"))return "L3";
if(v.includes("4"))return "L4";
if(v.includes("5"))return "L5";
return "L1";
}

let map={},lmap={};
lc.forEach(r=>{
map[(r[col(r,"name")]||"").toLowerCase()]=r[col(r,"login")];
lmap[(r[col(r,"name")]||"").toLowerCase()]=lcFix(r[col(r,"lc")]);
});

data=emp.map(r=>{
let k=(r[col(r,"name")]||"").toLowerCase();
return{
name:r[col(r,"name")],
login:map[k]||"",
lc:lmap[k]||"L1",
total:+r[col(r,"total")]||0,
infer:+r[col(r,"infer")]||0
};
});

render();
}

// ---------- RENDER ----------
function render(){

// LC TABLE
let lcs=["L1","L2","L3","L4","L5"];
let html=`<h2>LC SPLIT</h2><table>
<tr><th>LC</th><th>Total</th><th>Infer</th><th>UIT%</th></tr>`;

let gt=0,gi=0;

lcs.forEach(l=>{
let f=data.filter(x=>x.lc===l);
let t=f.reduce((a,b)=>a+b.total,0);
let i=f.reduce((a,b)=>a+b.infer,0);

gt+=t; gi+=i;

html+=`<tr>
<td>${l}</td>
<td>${t.toFixed(2)}</td>
<td>${i.toFixed(2)}</td>
<td>${t?((i/t)*100).toFixed(2):0}%</td>
</tr>`;
});

html+=`<tr class="grand">
<td>TOTAL</td>
<td>${gt.toFixed(2)}</td>
<td>${gi.toFixed(2)}</td>
<td>${gt?((gi/gt)*100).toFixed(2):0}%</td>
</tr></table>`;

// TOP
let top=[...data].filter(x=>x.total>0)
.sort((a,b)=>(b.infer/b.total)-(a.infer/a.total)).slice(0,20);

html+=`<h2>TOP DEFAULTERS</h2><table>
<tr>
<th>Name</th><th>Login</th><th>LC</th>
<th>Infer</th><th>Total</th><th>UIT%</th>
<th>Remarks</th><th>Coaching</th>
</tr>`;

top.forEach(r=>{
html+=`<tr>
<td>${r.name}</td>
<td>${r.login}</td>
<td>${r.lc}</td>
<td>${r.infer.toFixed(2)}</td>
<td>${r.total.toFixed(2)}</td>
<td>${((r.infer/r.total)*100).toFixed(2)}%</td>
<td contenteditable></td>
<td contenteditable></td>
</tr>`;
});

html+=`</table>`;

// UIT TABLE
html+=uitTable();

out.innerHTML=html;
calcUIT();
}

// ---------- UIT ----------
function uitTable(){
let cols=mode==="hours"
?Array.from({length:10},(_,i)=>"H"+(i+1))
:["Q1","Q2","Q3"];

return `<h2>UIT</h2><table class="uit">
<tr><th></th>${cols.map(c=>`<th>${c}</th>`)}<th>Total</th></tr>
<tr><td>Total</td>${cols.map(()=>`<td contenteditable></td>`)}<td></td></tr>
<tr><td>Infer</td>${cols.map(()=>`<td contenteditable></td>`)}<td></td></tr>
<tr><td>UIT%</td>${cols.map(()=>`<td></td>`)}<td></td></tr>
</table>`;
}

function calcUIT(){
document.querySelectorAll(".uit").forEach(t=>{
let total=t.rows[1].cells;
let infer=t.rows[2].cells;
let uit=t.rows[3].cells;

function update(){
let ts=0,is=0;
for(let i=1;i<total.length-1;i++){
let a=parseFloat(total[i].innerText)||0;
let b=parseFloat(infer[i].innerText)||0;
ts+=a; is+=b;
uit[i].innerText=a?((b/a)*100).toFixed(2)+"%":"";
}
total[total.length-1].innerText=ts;
infer[infer.length-1].innerText=is;
uit[uit.length-1].innerText=ts?((is/ts)*100).toFixed(2)+"%":"";
}

for(let i=1;i<total.length-1;i++){
total[i].oninput=update;
infer[i].oninput=update;
}
});
}

// ---------- READ ----------
function read(file){
return new Promise(res=>{
let r=new FileReader();
r.onload=e=>{
let wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
res(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
};
r.readAsArrayBuffer(file);
});
}

// START
home();
</script>

</body>
</html>
