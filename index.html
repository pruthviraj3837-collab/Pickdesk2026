<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OUTBOUND TOOLS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;}

.page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
position:relative;
}

.black{background:#000;color:white;}
.white{background:#fff;color:black;}

.btn{
background:#ff9900;
color:#000;
font-weight:bold;
border:none;
padding:12px 26px;
margin:8px;
border-radius:10px;
cursor:pointer;
font-size:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.3);
}
.btn:hover{transform:scale(1.05);}

table{
border-collapse:collapse;
margin:12px auto;
width:85%;
font-size:12px;
}

th{
background:#3498db;
color:#fff;
padding:6px;
text-align:center;
font-weight:bold;
}

td{
border:1px solid #bbb;
padding:5px;
text-align:center;
}

tr:nth-child(even){background:#f2f2f2;}

.grand{
background:#d6eaf8;
font-weight:bold;
}

td[contenteditable]{background:#fff8dc;}

input{margin:5px;padding:5px;}
h1,h2{margin:10px;}
</style>
</head>

<body>

<div id="app"></div>

<script>
let app=document.getElementById("app");

function show(html){app.innerHTML=html;}

// HOME
function home(){
show(`
<div class="page black">
<img src="https://raw.githubusercontent.com/pruthviraj3837-collab/Pickdesk2026/main/Gemini_Generated_Image_v28qxev28qxev28q%20(1).png"
style="position:absolute;width:100%;height:100%;object-fit:cover;">
<button class="btn" style="position:absolute;bottom:30px;" onclick="tools()">NEXT →</button>
</div>
`);
}

// TOOLS
function tools(){
show(`
<div class="page black">
<h1>TOOLS</h1>
<button class="btn" onclick="pickTools()">PICK TOOLS</button>
<button class="btn" onclick="packTools()">PACK TOOLS</button>
</div>
`);
}

// PICK
function pickTools(){
show(`
<div class="page black">
<h1>PICK TOOLS</h1>
<button class="btn" onclick="pickTracker()">PICK UIT TRACKER</button>
<button class="btn" onclick="links()">PICK LINKS</button>
<button class="btn" onclick="under()">TAMPERMONKEY</button>
<button class="btn" onclick="under()">IO ADDRESS</button>
<button class="btn" onclick="tools()">⬅ BACK</button>
</div>
`);
}

// PACK
function packTools(){
show(`
<div class="page black">
<h1>PACK TOOLS</h1>
<button class="btn" onclick="packTracker()">PACK UIT TRACKER</button>
<button class="btn" onclick="tools()">⬅ BACK</button>
</div>
`);
}

function under(){
show(`<div class="page black"><h1>Will be added soon</h1>
<button class="btn" onclick="tools()">⬅ BACK</button></div>`);
}

// LINKS (dynamic)
function openLink(url){window.open(url,'_blank');}

function links(){
let linksData=[
{name:"FCLM",url:"https://fclm-portal.amazon.com"},
{name:"AFTLITE",url:"https://aftlite.amazon.com"},
{name:"RODEO",url:"https://rodeo.amazon.com"},
{name:"INSIDE",url:"https://inside.amazon.com"},
{name:"QUIP",url:"https://quip-amazon.com"},
{name:"WIKI",url:"https://w.amazon.com"},
{name:"A TO Z",url:"https://atoz.amazon.work"},
{name:"KIBANA",url:"https://kibana.amazon.com"},
{name:"SLACK",url:"https://slack.com"},
{name:"OUTLOOK",url:"https://outlook.office.com"},
{name:"GOOGLE",url:"https://google.com"},
{name:"YOUTUBE",url:"https://youtube.com"},
{name:"GITHUB",url:"https://github.com"},
{name:"CHATGPT",url:"https://chat.openai.com"}
];

let buttons=linksData.map(l=>`<button class="btn" onclick="openLink('${l.url}')">${l.name}</button>`).join("");

show(`<div class="page white">
<h1>PICK LINKS</h1>
<div style="width:90%;display:flex;flex-wrap:wrap;justify-content:center;">
${buttons}
</div>
<button class="btn" onclick="pickTools()">⬅ BACK</button>
</div>`);
}

// TRACKER
let data=[],mode="quarters";

function trackerUI(type){
show(`
<div class="page white">
<h1>${type} UIT TRACKER</h1>

<input type="file" id="f1">
<input type="file" id="f2"><br>
<button class="btn" onclick="process()">PROCESS</button>

<div>
<button class="btn" onclick="mode='hours';render()">HOURS</button>
<button class="btn" onclick="mode='quarters';render()">QUARTERS</button>
</div>

<div id="out"></div>
<button class="btn" onclick="tools()">⬅ BACK</button>
</div>
`);
}

function pickTracker(){trackerUI("PICK");}
function packTracker(){trackerUI("PACK");}

// PROCESS
async function process(){
let emp=await read(f1.files[0]);
let lc=await read(f2.files[0]);

function col(o,k){return Object.keys(o).find(c=>c.toLowerCase().includes(k));}

let map={},lmap={};

lc.forEach(r=>{
let name=(r[col(r,"name")]||"").toLowerCase();
map[name]=r[col(r,"login")];
lmap[name]=(r[col(r,"lc")]||"L1");
});

data=emp.map(r=>{
let k=(r[col(r,"name")]||"").toLowerCase();
return{
name:r[col(r,"name")],
login:map[k]||"",
lc:lmap[k]||"L1",
total:+r[col(r,"total")]||0,
infer:+r[col(r,"infer")]||0
};
});

render();
}

// RENDER
function render(){

let html=`<h2>LC SPLIT</h2><table>
<tr><th>LC</th><th>Total</th><th>Infer</th><th>UIT%</th></tr>`;

let lcs=["L1","L2","L3","L4","L5"];
let gt=0,gi=0;

lcs.forEach(l=>{
let f=data.filter(x=>x.lc===l);
let t=f.reduce((a,b)=>a+b.total,0);
let i=f.reduce((a,b)=>a+b.infer,0);
gt+=t; gi+=i;

html+=`<tr>
<td>${l}</td>
<td>${t.toFixed(2)}</td>
<td>${i.toFixed(2)}</td>
<td>${t?((i/t)*100).toFixed(2):0}%</td>
</tr>`;
});

html+=`<tr class="grand">
<td>TOTAL</td>
<td>${gt.toFixed(2)}</td>
<td>${gi.toFixed(2)}</td>
<td>${gt?((gi/gt)*100).toFixed(2):0}%</td>
</tr></table>`;

// TOP TABLE
let top=[...data].filter(x=>x.total>0)
.sort((a,b)=>(b.infer/b.total)-(a.infer/a.total)).slice(0,20);

html+=`<h2 style="text-align:center;">TOP DEFAULTERS</h2><table>
<tr>
<th>Name</th><th>Login</th><th>LC</th>
<th>Infer</th><th>Total</th><th>UIT%</th>
<th>UPH</th><th>Quantity</th>
<th>Remarks</th><th>Coaching</th>
</tr>`;

top.forEach(r=>{
html+=`<tr>
<td>${r.name}</td>
<td>${r.login}</td>
<td>${r.lc}</td>
<td>${r.infer.toFixed(2)}</td>
<td>${r.total.toFixed(2)}</td>
<td>${((r.infer/r.total)*100).toFixed(2)}%</td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
</tr>`;
});

html+=`</table>`;
html+=uitTable();

out.innerHTML=html;
calcUIT();
}

// UIT TABLE
function uitTable(){
let cols=mode==="hours"
?Array.from({length:10},(_,i)=>"H"+(i+1))
:["Q1","Q2","Q3"];

return `<h2>UIT</h2><table class="uit">
<tr><th></th>${cols.map(c=>`<th>${c}</th>`)}<th>Total</th></tr>
<tr><td>Total</td>${cols.map(()=>`<td contenteditable></td>`)}<td></td></tr>
<tr><td>Infer</td>${cols.map(()=>`<td contenteditable></td>`)}<td></td></tr>
<tr><td>UIT%</td>${cols.map(()=>`<td></td>`)}<td></td></tr>
</table>`;
}

// CALC
function calcUIT(){
document.querySelectorAll(".uit").forEach(t=>{
let total=t.rows[1].cells;
let infer=t.rows[2].cells;
let uit=t.rows[3].cells;

function update(){
let ts=0,is=0;
for(let i=1;i<total.length-1;i++){
let a=parseFloat(total[i].innerText)||0;
let b=parseFloat(infer[i].innerText)||0;
ts+=a; is+=b;
uit[i].innerText=a?((b/a)*100).toFixed(2)+"%":"";
}
total[total.length-1].innerText=ts.toFixed(2);
infer[infer.length-1].innerText=is.toFixed(2);
uit[uit.length-1].innerText=ts?((is/ts)*100).toFixed(2)+"%":"";
}

for(let i=1;i<total.length-1;i++){
total[i].oninput=update;
infer[i].oninput=update;
}
});
}

// READ
function read(file){
return new Promise(res=>{
let r=new FileReader();
r.onload=e=>{
let wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
res(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
};
r.readAsArrayBuffer(file);
});
}

// START
home();
</script>

</body>
</html>
