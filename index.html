<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OUTBOUND TOOLS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;}

.page{height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;}
.black{background:#000;color:#fff;}
.white{background:#fff;color:#000;}

.btn{
background:#ff9900;
font-weight:bold;
border:none;
padding:10px 20px;
margin:6px;
border-radius:8px;
cursor:pointer;
}

table{border-collapse:collapse;width:90%;margin:10px auto;font-size:12px;}
th{background:#3498db;color:#fff;padding:6px;text-align:center;}
td{border:1px solid #bbb;padding:5px;text-align:center;}
tr:nth-child(even){background:#f2f2f2;}
.grand{background:#d6eaf8;font-weight:bold;}
td[contenteditable]{background:#fff8dc;}
</style>
</head>

<body>
<div id="app"></div>

<script>
let app=document.getElementById("app");
let data=[],mode="hours";

// ---------- REMARKS ----------
let remarksList=[
"Low Rate","Idle Time","Quality Issue","Late Start","Early Logout",
"Break Extension","System Issue","Training Required","Process Gap",
"Fatigue","Behavior Issue","Unplanned Leave","Rebin Delay",
"Scanning Issue","Other"
];

let coachingList=["Yes","No","Pending"];

function dropdown(list){
return `<select>${list.map(x=>`<option>${x}</option>`).join("")}</select>`;
}

// ---------- NAV ----------
function show(x){app.innerHTML=x;}

// ---------- HOME ----------
function home(){
show(`<div class="page black">
<h1>OUTBOUND TOOLS</h1>
<button class="btn" onclick="tools()">NEXT</button>
</div>`);
}

// ---------- TOOLS ----------
function tools(){
show(`<div class="page black">
<h1>TOOLS</h1>
<button class="btn" onclick="tracker()">TRACKER</button>
<button class="btn" onclick="links()">LINKS</button>
</div>`);
}

// ---------- LINKS ----------
function openLink(u){window.open(u,'_blank');}

function links(){

let linksData=[
{name:"FCLM",url:"https://fclm-portal.amazon.com"},
{name:"AFTLITE",url:"https://aftlite.amazon.com"},
{name:"RODEO",url:"https://rodeo.amazon.com"},
{name:"INSIDE",url:"https://inside.amazon.com"},
{name:"QUIP",url:"https://quip-amazon.com"},
{name:"WIKI",url:"https://w.amazon.com"},
{name:"A TO Z",url:"https://atoz.amazon.work"},
{name:"KIBANA",url:"https://kibana.amazon.com"},
{name:"SLACK",url:"https://slack.com"},
{name:"OUTLOOK",url:"https://outlook.office.com"},
{name:"GOOGLE",url:"https://google.com"},
{name:"YOUTUBE",url:"https://youtube.com"},
{name:"GITHUB",url:"https://github.com"},
{name:"CHATGPT",url:"https://chat.openai.com"}
];

let btns=linksData.map(l=>`<button class="btn" onclick="openLink('${l.url}')">${l.name}</button>`).join("");

show(`<div class="page white">
<h1>LINKS</h1>
${btns}
<button class="btn" onclick="tools()">BACK</button>
</div>`);
}

// ---------- TRACKER ----------
function tracker(){
show(`<div class="page white">
<h1>UIT TRACKER</h1>

<input type="file" id="f1">
<input type="file" id="f2"><br>

<button class="btn" onclick="process()">PROCESS</button>

<div id="out"></div>

<button class="btn" onclick="tools()">BACK</button>
</div>`);
}

// ---------- PROCESS ----------
async function process(){

let emp=await read(f1.files[0]);
let lc=await read(f2.files[0]);

function col(o,k){return Object.keys(o).find(c=>c.toLowerCase().includes(k));}

let map={},lmap={};

lc.forEach(r=>{
let n=(r[col(r,"name")]||"").toLowerCase();
map[n]=r[col(r,"login")];
lmap[n]=r[col(r,"lc")]||"L1";
});

data=emp.map(r=>{
let k=(r[col(r,"name")]||"").toLowerCase();
let total=+r[col(r,"total")]||0;
let qty=+r[col(r,"quantity")]||0;

return{
name:r[col(r,"name")],
login:map[k]||"",
lc:lmap[k]||"L1",
process:(r[col(r,"process")]||"PICK").toUpperCase(),
total:total,
infer:+r[col(r,"infer")]||0,
qty:qty,
uph: total?(qty/total):0
};
});

render();
}

// ---------- RENDER ----------
function render(){

let html="";

["PICK","TRANS","VRET"].forEach(p=>{

let d=data.filter(x=>x.process.includes(p));
if(!d.length)return;

// LC SPLIT WITH COUNT
html+=`<h2>${p} LC SPLIT</h2><table>
<tr><th>LC</th><th>Employees</th><th>Total</th><th>Infer</th><th>UIT%</th></tr>`;

["L1","L2","L3","L4","L5"].forEach(l=>{
let f=d.filter(x=>x.lc===l);
let t=f.reduce((a,b)=>a+b.total,0);
let i=f.reduce((a,b)=>a+b.infer,0);

html+=`<tr>
<td>${l}</td>
<td>${f.length}</td>
<td>${t.toFixed(2)}</td>
<td>${i.toFixed(2)}</td>
<td>${t?((i/t)*100).toFixed(2):0}%</td>
</tr>`;
});

html+=`</table>`;

// TOP
let top=[...d].slice(0,10);

html+=`<h2>${p} TOP DEFAULTERS</h2><table>
<tr>
<th>Name</th><th>Login</th><th>LC</th>
<th>Infer</th><th>Total</th><th>UIT%</th>
<th>Qty</th><th>UPH</th>
<th>Remarks</th><th>Coaching</th>
</tr>`;

top.forEach(r=>{
html+=`<tr>
<td>${r.name}</td>
<td>${r.login}</td>
<td>${r.lc}</td>
<td>${r.infer.toFixed(2)}</td>
<td>${r.total.toFixed(2)}</td>
<td>${((r.infer/r.total)*100).toFixed(2)}%</td>
<td>${r.qty}</td>
<td>${r.uph.toFixed(2)}</td>
<td>${dropdown(remarksList)}</td>
<td>${dropdown(coachingList)}</td>
</tr>`;
});

html+=`</table>`;

// BUTTONS BACK
html+=`
<button class="btn" onclick="mode='hours';render()">HOURS</button>
<button class="btn" onclick="mode='quarters';render()">QUARTERS</button>
`;

html+=timeTable(p);

});

out.innerHTML=html;
}

// ---------- TIME TABLE ----------
function timeTable(title){

let cols = mode==="hours"
?Array.from({length:10},(_,i)=>"H"+(i+1))
:["Q1","Q2","Q3"];

return `<h3>${title} ${mode.toUpperCase()}</h3>
<table>
<tr><th></th>${cols.map(c=>`<th>${c}</th>`)}<th>Total</th></tr>
<tr><td>Total</td>${cols.map(()=>`<td contenteditable></td>`)}<td></td></tr>
<tr><td>Infer</td>${cols.map(()=>`<td contenteditable></td>`)}<td></td></tr>
<tr><td>UIT%</td>${cols.map(()=>`<td></td>`)}<td></td></tr>
</table>`;
}

// ---------- READ ----------
function read(file){
return new Promise(res=>{
let r=new FileReader();
r.onload=e=>{
let wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
res(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
};
r.readAsArrayBuffer(file);
});
}

// START
home();
</script>

</body>
</html>
