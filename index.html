<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OUTBOUND TOOLS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI;}

.page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
position:relative;
}

.black{background:#000;color:white;}
.white{background:#fff;color:black;}

.btn{
background:#ff9900;
color:#000;
font-weight:bold;
border:none;
padding:12px 26px;
margin:8px;
border-radius:10px;
cursor:pointer;
font-size:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.3);
}

table{
border-collapse:collapse;
margin:12px auto;
width:85%;
font-size:12px;
}

th{
background:#3498db;
color:#fff;
padding:6px;
text-align:center;
font-weight:bold;
}

td{
border:1px solid #bbb;
padding:5px;
text-align:center;
}

tr:nth-child(even){background:#f2f2f2;}

.grand{background:#d6eaf8;font-weight:bold;}

td[contenteditable]{background:#fff8dc;}
</style>
</head>

<body>
<div id="app"></div>

<script>
let app=document.getElementById("app");

// ---------- DATA ----------
let data=[],mode="quarters";

let remarksList=[
"Low Rate","Idle Time","Quality Issue","Late Start","Early Logout",
"Break Extension","System Issue","Training Required","Process Gap",
"Fatigue","Behavior Issue","Unplanned Leave","Rebin Delay",
"Scanning Issue","Other"
];

let coachingList=["Yes","No","Pending"];

// ---------- NAV ----------
function show(x){app.innerHTML=x;}

// ---------- HOME ----------
function home(){
show(`
<div class="page black">
<img src="https://raw.githubusercontent.com/pruthviraj3837-collab/Pickdesk2026/main/Gemini_Generated_Image_v28qxev28qxev28q%20(1).png"
style="position:absolute;width:100%;height:100%;object-fit:cover;">
<button class="btn" style="position:absolute;bottom:30px;" onclick="tools()">NEXT →</button>
</div>`);
}

// ---------- TOOLS ----------
function tools(){
show(`<div class="page black">
<h1>TOOLS</h1>
<button class="btn" onclick="pickTracker()">PICK TRACKER</button>
<button class="btn" onclick="packTracker()">PACK TRACKER</button>
</div>`);
}

// ---------- TRACKER ----------
function pickTracker(){trackerUI("PICK");}
function packTracker(){trackerUI("PACK");}

function trackerUI(type){
show(`<div class="page white">
<h1>${type} UIT TRACKER</h1>

<input type="file" id="f1">
<input type="file" id="f2"><br>

<button class="btn" onclick="process()">PROCESS</button>
<button class="btn" onclick="downloadExcel()">DOWNLOAD REPORT</button>

<div id="out"></div>

<button class="btn" onclick="tools()">⬅ BACK</button>
</div>`);
}

// ---------- PROCESS ----------
async function process(){

let emp=await read(f1.files[0]);
let lc=await read(f2.files[0]);

function col(o,k){return Object.keys(o).find(c=>c.toLowerCase().includes(k));}

let map={},lmap={};

lc.forEach(r=>{
let n=(r[col(r,"name")]||"").toLowerCase();
map[n]=r[col(r,"login")];
lmap[n]=r[col(r,"lc")]||"L1";
});

data=emp.map(r=>{
let k=(r[col(r,"name")]||"").toLowerCase();

let total=+r[col(r,"total")]||0;
let qty=+r[col(r,"qty")]||+r[col(r,"quantity")]||0;

return{
name:r[col(r,"name")],
login:map[k]||"",
lc:lmap[k]||"L1",
process:(r[col(r,"process")]||"PICK").toUpperCase(),
total:total,
infer:+r[col(r,"infer")]||0,
qty:qty,
uph: total?(qty/total):0
};
});

render();
}

// ---------- DROPDOWN ----------
function dropdown(list){
return `<select>${list.map(x=>`<option>${x}</option>`).join("")}</select>`;
}

// ---------- RENDER ----------
function render(){

let html="";

// LC SPLIT
let lcs=["L1","L2","L3","L4","L5"];
let gt=0,gi=0;

html+=`<h2 style="text-align:center;">LC SPLIT</h2><table>
<tr><th>LC</th><th>Total</th><th>Infer</th><th>UIT%</th></tr>`;

lcs.forEach(l=>{
let f=data.filter(x=>x.lc===l);
let t=f.reduce((a,b)=>a+b.total,0);
let i=f.reduce((a,b)=>a+b.infer,0);
gt+=t; gi+=i;

html+=`<tr>
<td>${l}</td>
<td>${t.toFixed(2)}</td>
<td>${i.toFixed(2)}</td>
<td>${t?((i/t)*100).toFixed(2):0}%</td>
</tr>`;
});

html+=`<tr class="grand">
<td>TOTAL</td>
<td>${gt.toFixed(2)}</td>
<td>${gi.toFixed(2)}</td>
<td>${gt?((gi/gt)*100).toFixed(2):0}%</td>
</tr></table>`;

// PROCESS TABLES
["PICK","TRANS","VRET"].forEach(p=>{

let list=data.filter(x=>x.process.includes(p)&&x.total>0)
.sort((a,b)=>(b.infer/b.total)-(a.infer/a.total)).slice(0,15);

if(!list.length)return;

html+=`<h2 style="text-align:center;">${p} TOP DEFAULTERS</h2><table>
<tr>
<th>Name</th><th>Login</th><th>LC</th>
<th>Infer</th><th>Total</th><th>UIT%</th>
<th>Qty</th><th>UPH</th>
<th>Remarks</th><th>Coaching</th>
</tr>`;

list.forEach(r=>{
html+=`<tr>
<td>${r.name}</td>
<td>${r.login}</td>
<td>${r.lc}</td>
<td>${r.infer.toFixed(2)}</td>
<td>${r.total.toFixed(2)}</td>
<td>${((r.infer/r.total)*100).toFixed(2)}%</td>
<td>${r.qty}</td>
<td>${r.uph.toFixed(2)}</td>
<td>${dropdown(remarksList)}</td>
<td>${dropdown(coachingList)}</td>
</tr>`;
});

html+=`</table>`;

// HOURS + QUARTERS
html+=timeTables(p);

});

out.innerHTML=html;
}

// ---------- TIME TABLES ----------
function timeTables(title){

let h=Array.from({length:10},(_,i)=>"H"+(i+1));
let q=["Q1","Q2","Q3"];

function build(cols,name){
return `
<h3 style="text-align:center;">${title} - ${name}</h3>
<table>
<tr><th></th>${cols.map(c=>`<th>${c}</th>`)}<th>Total</th></tr>
<tr><td>Total</td>${cols.map(()=>`<td contenteditable></td>`)}<td></td></tr>
<tr><td>Infer</td>${cols.map(()=>`<td contenteditable></td>`)}<td></td></tr>
<tr><td>UIT%</td>${cols.map(()=>`<td></td>`)}<td></td></tr>
</table>`;
}

return build(h,"HOURS")+build(q,"QUARTERS");
}

// ---------- DOWNLOAD ----------
function downloadExcel(){
let wb=XLSX.utils.book_new();

document.querySelectorAll("table").forEach((t,i)=>{
let ws=XLSX.utils.table_to_sheet(t);
XLSX.utils.book_append_sheet(wb,ws,"Table"+(i+1));
});

XLSX.writeFile(wb,"UIT_Report.xlsx");
}

// ---------- READ ----------
function read(file){
return new Promise(res=>{
let r=new FileReader();
r.onload=e=>{
let wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
res(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
};
r.readAsArrayBuffer(file);
});
}

// START
home();
</script>

</body>
</html>
