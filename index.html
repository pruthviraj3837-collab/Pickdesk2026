  function downloadExcel(){

let wb = XLSX.utils.book_new();
let ws_data = [];

// ---------- LC SPLIT ----------
ws_data.push(["LC SPLIT"]);
ws_data.push(["LC","Total","Infer","UIT%"]);

let lcs=["L1","L2","L3","L4","L5"];
let gt=0,gi=0;

lcs.forEach(l=>{
let f=data.filter(x=>x.lc===l);

let i=f.reduce((a,b)=>a+b.infer,0);

gt+=t; gi+=i;

ws_data.push([
l,
t.toFixed(2),
i.toFixed(2),
t?((i/t)*100).toFixed(2)+"%":"0%"
]);
});

ws_data.push([
"TOTAL",
gt.toFixed(2),
gi.toFixed(2),
gt?((gi/gt)*100).toFixed(2)+"%":"0%"
]);

ws_data.push([]);

// ---------- TOP DEFAULTERS ----------
ws_data.push(["TOP UIT DEFAULTERS"]);
ws_data.push(["Name","Login","LC","Infer","Total","UIT%","Comments","Coaching"]);

document.querySelectorAll("table")[1].querySelectorAll("tr").forEach((tr,i)=>{
if(i===0) return;

let row=[];
tr.querySelectorAll("td").forEach(td=>{
row.push(td.innerText);
});

ws_data.push(row);
});

ws_data.push([]);

// ---------- UIT TABLES ----------
document.querySelectorAll(".uit").forEach((table,index)=>{

ws_data.push([titles[index]]);

});

});

});

// ---------- CREATE SHEET ----------

XLSX.utils.book_append_sheet(wb, ws, "UIT REPORT");

// ---------- DOWNLOAD ----------
XLSX.writeFile(wb, "UIT_Report.xlsx");

  }

function pickTracker(){trackerUI("PICK");}
function packTracker(){trackerUI("PACK");}

// ---------- DATA ----------
let data=[],mode="quarters";

// ---------- PROCESS ----------
async function process(){
let emp=await read(f1.files[0]);
let lc=await read(f2.files[0]);

function col(o,k){return Object.keys(o).find(c=>c.toLowerCase().includes(k));}
function lcFix(v){
v=(v||"")+"";
if(v.includes("1"))return "L1";
if(v.includes("2"))return "L2";
if(v.includes("3"))return "L3";
if(v.includes("4"))return "L4";
if(v.includes("5"))return "L5";
return "L1";
}

let map={},lmap={};
lc.forEach(r=>{
map[(r[col(r,"name")]||"").toLowerCase()]=r[col(r,"login")];
lmap[(r[col(r,"name")]||"").toLowerCase()]=lcFix(r[col(r,"lc")]);
});

data=emp.map(r=>{
let k=(r[col(r,"name")]||"").toLowerCase();
return{
name:r[col(r,"name")],
login:map[k]||"",
lc:lmap[k]||"L1",
total:+r[col(r,"total")]||0,
infer:+r[col(r,"infer")]||0
};
});

render();
}

// ---------- RENDER ----------
function render(){

// LC TABLE
let lcs=["L1","L2","L3","L4","L5"];
let html=`<h2>LC SPLIT</h2><table>
<tr><th>LC</th><th>Total</th><th>Infer</th><th>UIT%</th></tr>`;

let gt=0,gi=0;

lcs.forEach(l=>{
let f=data.filter(x=>x.lc===l);
let t=f.reduce((a,b)=>a+b.total,0);
let i=f.reduce((a,b)=>a+b.infer,0);

gt+=t; gi+=i;

html+=`<tr>
<td>${l}</td>
<td>${t.toFixed(2)}</td>
<td>${i.toFixed(2)}</td>
<td>${t?((i/t)*100).toFixed(2):0}%</td>
</tr>`;
});

html+=`<tr class="grand">
<td>TOTAL</td>
<td>${gt.toFixed(2)}</td>
<td>${gi.toFixed(2)}</td>
<td>${gt?((gi/gt)*100).toFixed(2):0}%</td>
</tr></table>`;

// TOP
let top=[...data].filter(x=>x.total>0)
.sort((a,b)=>(b.infer/b.total)-(a.infer/a.total)).slice(0,20);

html+=`<h2>TOP DEFAULTERS</h2><table>
<tr>
<th>Name</th><th>Login</th><th>LC</th>
<th>Infer</th><th>Total</th><th>UIT%</th>
<th>Remarks</th><th>Coaching</th>
</tr>`;

top.forEach(r=>{
html+=`<tr>
<td>${r.name}</td>
<td>${r.login}</td>
<td>${r.lc}</td>
<td>${r.infer.toFixed(2)}</td>
<td>${r.total.toFixed(2)}</td>
<td>${((r.infer/r.total)*100).toFixed(2)}%</td>
<td contenteditable></td>
<td contenteditable></td>
</tr>`;
});

html+=`</table>`;

// UIT TABLE
html+=uitTable();

out.innerHTML=html;
calcUIT();
}

// ---------- UIT ----------
function uitTable(title){

let cols = mode==="hours"
? Array.from({length:10},(_,i)=>"HOUR"+(i+1))
: ["Q1","Q2","Q3"];

return `
<h2>${title}</h2>
<table class="uit">

<tr>
<th>Type</th>
${cols.map(c=>`<th>${c}</th>`).join("")}
<th>Total</th>
</tr>

<tr>
<td>Total</td>
${cols.map(()=>`<td contenteditable></td>`).join("")}
<td></td>
</tr>

<tr>
<td>Infer</td>
${cols.map(()=>`<td contenteditable></td>`).join("")}
<td></td>
</tr>

<tr>
<td>UIT%</td>
${cols.map(()=>`<td></td>`).join("")}
<td></td>
</tr>

</table>
`;
}

function calcUIT(){
document.querySelectorAll(".uit").forEach(t=>{
let total=t.rows[1].cells;
let infer=t.rows[2].cells;
let uit=t.rows[3].cells;

function update(){
let ts=0,is=0;
for(let i=1;i<total.length-1;i++){
let a=parseFloat(total[i].innerText)||0;
let b=parseFloat(infer[i].innerText)||0;
ts+=a; is+=b;
uit[i].innerText=a?((b/a)*100).toFixed(2)+"%":"";
}
total[total.length-1].innerText=ts;
infer[infer.length-1].innerText=is;
uit[uit.length-1].innerText=ts?((is/ts)*100).toFixed(2)+"%":"";
}

for(let i=1;i<total.length-1;i++){
total[i].oninput=update;
infer[i].oninput=update;
}
});
}

// ---------- READ ----------
function read(file){
return new Promise(res=>{
let r=new FileReader();
r.onload=e=>{
let wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
res(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
};
r.readAsArrayBuffer(file);
});
}
